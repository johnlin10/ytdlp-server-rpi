<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ytdlp-server-rpi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="term">
    <div class="term-bar">
      <span class="dot dot-red"></span>
      <span class="dot dot-amber"></span>
      <span class="dot dot-green"></span>
      <span class="term-name">tdkrp@ytdlp-server-rpi: ~/downloads</span>
    </div>

    <div class="term-body">
      <header class="head">
        <h1>ytdlp-server-rpi<span class="cursor"></span></h1>
        <p class="comment"># yt-dlp download server · local network / raspberry pi</p>
      </header>

      <details id="settings" class="settings">
        <summary class="settings-summary">
          <span class="comment"># preferences · vim ~/settings.json</span>
          <span class="settings-hint">[ edit ]</span>
        </summary>

        <form id="settings-form" class="settings-body">
          <label class="set-row">
            <span class="set-label">download codec priority</span>
            <span class="set-desc"># preferred first; falls back down the list</span>
            <div id="codec-priority" class="codec-priority"></div>
          </label>

          <label class="set-row set-inline">
            <input type="checkbox" id="auto-transcode" />
            <span class="set-label">auto-transcode incompatible files</span>
            <span class="set-desc"># re-encode VP9/AV1 into an iOS/macOS mp4</span>
          </label>

          <label class="set-row">
            <span class="set-label">transcode target</span>
            <span class="set-desc"># h264 = fast on a Pi · hevc = smaller, slow to encode</span>
            <select id="transcode-target" class="set-select"></select>
          </label>

          <label class="set-row">
            <span class="set-label">max resolution (height px)</span>
            <span class="set-desc"># 0 = no limit · e.g. 1080 caps downloads at 1080p</span>
            <input type="number" id="max-height" class="set-input" min="0" step="1" />
          </label>

          <div class="settings-actions">
            <button type="submit" id="settings-save">save</button>
            <span id="settings-status" class="settings-status"></span>
          </div>
        </form>
      </details>

      <section class="panel">
        <form id="download-form" class="input-row">
          <span class="prompt">$</span>
          <input
            type="text"
            id="url-input"
            placeholder="url(s), comma-separated"
            autocomplete="off"
            spellcheck="false"
            required
          />
          <button type="submit" id="submit-btn">run</button>
        </form>

        <div id="jobs" class="jobs"></div>
      </section>

      <section class="log-section">
        <p class="comment"># history · ls ~/downloads</p>

        <div id="storage" class="storage">
          <div class="storage-head">
            <span class="storage-label">df -h ~/downloads</span>
            <span class="storage-figures" id="storage-figures">—</span>
          </div>
          <div class="storage-bar" id="storage-bar"></div>
        </div>

        <div id="history-log" class="history-log">
          <p class="empty-state">no downloads yet — paste a url above to begin.</p>
        </div>
      </section>
    </div>
  </main>

  <script src="app.js"></script>
</body>

</html>
